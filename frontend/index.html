<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#5a9e8a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="SyqueX" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>SyqueX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: {
              DEFAULT: '#1C1917',
              secondary: '#57534E',
              tertiary: '#A8A29E',
              muted: '#D6D3D1',
            },
            sage: {
              DEFAULT: '#5B7A6A',
              dark: '#3D5248',
              light: '#EBF2EE',
              50: '#F4F8F5',
            },
            parchment: {
              DEFAULT: '#F7F4EF',
              dark: '#EDE8E0',
            }
          },
          fontFamily: {
            sans: ['"Inter"', 'sans-serif'],
            mono: ['"Fira Code"', 'monospace']
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --color-base: #ffffff;
      --color-sidebar: #f4f4f2;
      --color-sage: #5a9e8a;
      --color-amber: #c4935a;
      --color-ink: #18181b;
      --color-muted: #9ca3af;
    }

    body {
      background-color: #F7F4EF;
      color: #1C1917;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #D6D3D1;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #A8A29E;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .font-serif {
      font-family: 'Lora', Georgia, 'Times New Roman', serif;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    .animate-blink {
      animation: blink 1s step-end infinite;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
