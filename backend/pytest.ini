[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    asyncio: async test (handled automatically by pytest-asyncio)
    unit: unit tests
    integration: integration tests (require real DB)
    slow: slow tests
